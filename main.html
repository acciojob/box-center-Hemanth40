<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Center Box -->
  <div style="
    width:200px;
    height:200px;
    background-color:lightblue;
    border:2px solid black;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
  ">

    <!-- Center Text -->
    <p style="
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      color:purple;
      margin:0;
    ">
      This is center.
    </p>

  </div>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
